<div class="login-wrapper">

  <div class="login-box glass-card">

    <div class="login-logo">Lockinspiel</div>

    <div class="input-group">
      <label class="section-label">Username</label>
      <input
        class="input-field"
        type="text"
        placeholder="Enter username"
        [value]="username()"
        (input)="updateUsername($event)" />
    </div>

    <div class="input-group">
      <label class="section-label">Password</label>
      <input
        class="input-field"
        type="password"
        placeholder="Enter password"
        [value]="password()"
        (input)="updatePassword($event)" />
    </div>

    @if (error()) {
      <div class="error-msg">{{ error() }}</div>
    }

    <button class="login-btn btn-primary" (click)="login()">Enter</button>

  </div>

</div>
