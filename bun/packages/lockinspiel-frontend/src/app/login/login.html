<div class="login-wrapper">
  <form class="login-box" [formGroup]="loginGroup">
    <div class="login-logo">Lockinspiel</div>

    <div class="input-group">
      <label>Username</label>
      <input
        type="text"
        placeholder="Enter username"
        [formControl]="loginGroup.controls.username"
      />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input
        type="password"
        placeholder="Enter password"
        [formControl]="loginGroup.controls.password"
      />
    </div>

    @if (error() !== null) {
      <div class="error-msg">{{ error() }}</div>
    }

    <div class="login-btn-flex">
      <button class="login-btn" (click)="login()">Enter</button>
      <button class="login-btn" (click)="signUp()">Sign-Up</button>
    </div>
  </form>
</div>
