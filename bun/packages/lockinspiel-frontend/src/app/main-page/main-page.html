<div class="page-wrapper">

  <header class="header">
    <span class="logo">Lockinspiel</span>
    @if (userProfile.userProfile()) {
      <button class="profile-btn" (click)="openOwnProfile()">
        {{ userProfile.userProfile()?.display_name }}
      </button>
    } @else {
      <button class="profile-btn" (click)="router.navigate(['/profile'])">User Profile</button>
    }
  </header>

  <div class="content">

    <div class="sidebar sidebar-left">
      <div class="sidebar-panel" [class.closed]="!savedOpen()">
        <app-saved-list />
      </div>
      <button class="sidebar-tab tab-right" (click)="toggleSaved()">Saved</button>
    </div>

    <main class="center">
      <div class="center-box">
        @if (timerRunning()) {
        <app-timer [workMinutes]="workMinutes()" [restMinutes]="restMinutes()" (timerStopped)="onTimerStopped()" />
        } @else {
        <app-set-timer (timerStarted)="onTimerStarted({ workMinutes: 25, restMinutes: 5 })" />
        }
      </div>
    </main>

    <div class="sidebar sidebar-right">
      <button class="sidebar-tab tab-left" (click)="toggleFriends()">Friends</button>
      <div class="sidebar-panel" [class.closed]="!friendsOpen()">
        <app-friend-list (profileClicked)="openFriendProfile($event)" />
      </div>
    </div>

  </div>

  <footer class="footer">
    <button class="settings-btn">⚙ Settings</button>
  </footer>

  <!-- ── Modal overlay ── -->
  @if (modalOpen()) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <app-user-profile [user]="modalUser()" (closed)="closeModal()" />
    </div>
  </div>
  }

</div>
