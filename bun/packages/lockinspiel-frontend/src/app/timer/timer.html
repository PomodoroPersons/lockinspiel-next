<div class="timer">
  @if (timerType() != 'unknown') {
    <div class="mode-label" [class.rest]="timerType() === 'rest'">
      {{ timerType() === 'work' ? 'Work' : 'Rest' }}
    </div>
  }

  <div class="countdown">
    {{ displayTime() }}
  </div>

  <div class="controls">
    <button class="ctrl-btn" [class.active]="timerRunning() == null" (click)="toggleTimerState()">
      @if (timerPaused()) {
        <ng-icon name="phosphorPlayFill" />
      } @else {
        <ng-icon name="phosphorPauseFill" />
      }
    </button>
    <button class="ctrl-btn" [class.active]="timerRunning() != null" cdkCopyToClipboard="{{ sharableLink() }}">
      <ng-icon name="phosphorShareFill" />
    </button>
    <button class="ctrl-btn stop" (click)="stop()">
      <ng-icon name="phosphorStopFill" />
    </button>
  </div>
</div>
