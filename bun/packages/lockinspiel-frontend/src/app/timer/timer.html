<div class="timer">
  @if (timerType() != 'unknown') {
    <div class="mode-label" [class.rest]="timerType() === 'rest'">
      {{ timerType() === 'work' ? 'Work' : 'Rest' }}
    </div>
  }

  <div class="countdown">
    {{ displayTime() }}
  </div>

  <div class="controls">
    <button class="ctrl-btn" [class.active]="timerRunning() == null" (click)="toggleTimerState()">
      @if (timerPaused()) {
        ▶
      } @else {
        ⏸
      }
    </button>
    <button class="ctrl-btn stop" (click)="stop()">⏹</button>
  </div>
</div>
