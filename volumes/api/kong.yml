_format_version: "3.0"

plugins:
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
  - name: opentelemetry
    config:
      traces_endpoint: http://otel-collector:4319/v1/traces
      logs_endpoint: http://otel-collector:4319/v1/logs
      # access_logs_endpoint: http://otel-collector:4319/logs
      # metrics:
      #   endpoint: http://otel-collector:4319/metrics
      # headers:
      #   X-Auth-Token: secret-token

services:
  - name: web-api-auth-service
    host: web-auth-upstream
    port: 3000
    protocol: http
    routes:
      - name: web-api-auth-routes
        strip_path: false
        paths:
          - /auth

# AI generated
upstreams:
  - name: web-auth-upstream
    algorithm: round-robin
    slots: 1000
    healthchecks:
      # Active checks: Kong periodically probes the endpoint
      # active:
      #   type: http
      #   http_path: "/health"
      #   timeout: 1
      #   concurrency: 10
      #   healthy:
      #     interval: 5
      #     http_statuses:
      #       - 200
      #       - 302
      #     successes: 2
      #   unhealthy:
      #     interval: 5
      #     http_statuses:
      #       - 429
      #       - 404
      #       - 500
      #       - 503
      #     tcp_failures: 2
      #     timeouts: 2
      #     http_failures: 2
      # Passive checks: Kong monitors real user traffic (Circuit Breaker)
      passive:
        type: http
        healthy:
          http_statuses:
            - 200
            - 201
          successes: 5
        unhealthy:
          http_statuses:
            - 500
            - 503
          tcp_failures: 2
          timeouts: 2
          http_failures: 5
    targets:
      - target: web-auth:3000
        weight: 100
