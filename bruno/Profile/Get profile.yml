info:
  name: Get profile
  type: http
  seq: 1
  tags:
    - Profile

http:
  method: GET
  url: "{{baseUrl}}/user/profile"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/user/profile"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "avatar_location": "/user/profile",
            "bio": "I wonder how Alice and Bob are doing",
            "display_name": "John Doe",
            "user_id": "00000000-0000-0000-0000-000000000000"
          }
