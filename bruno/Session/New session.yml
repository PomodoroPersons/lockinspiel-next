info:
  name: New session
  type: http
  seq: 1
  tags:
    - Session

http:
  method: POST
  url: "{{baseUrl}}/auth/session"
  headers:
    - name: lockinspiel_refresh
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "credentials": {
          "password": "password",
          "username": "johndoe"
        }
      }
  auth:
    type: apikey
    key: lockinspiel_refresh
    value: "{{apiKey}}"
    placement: header

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        // Save token to environment variable
        bru.setVar("token", body.access_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

