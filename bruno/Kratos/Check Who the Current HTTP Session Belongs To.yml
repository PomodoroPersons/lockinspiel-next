info:
  name: Check Who the Current HTTP Session Belongs To
  type: http
  seq: 25
  tags:
    - public

http:
  method: GET
  url: "{{authBaseUrl}}/sessions/whoami?tokenize_as=default_template"
  params:
    - name: tokenize_as
      value: default_template
      type: query
    - name: Authorization
      value: ""
      type: query
      description: "in: authorization"
      disabled: true

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        // Save token to environment variable
        bru.setVar("token", body.tokenized);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: session
    request:
      url: "{{baseUrl}}/sessions/whoami"
      method: GET
      headers:
        - name: Cookie
          value: ""
          disabled: true
        - name: X-Session-Token
          value: "{{apiKey}}"
      params:
        - name: Authorization
          value: ""
          type: query
          description: "in: authorization"
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "active": false,
            "authenticated_at": "",
            "expires_at": "",
            "id": "",
            "identity": {
              "id": "",
              "recovery_addresses": [
                {
                  "id": "",
                  "value": "",
                  "via": ""
                }
              ],
              "schema_id": "",
              "schema_url": "",
              "traits": {},
              "verifiable_addresses": [
                {
                  "id": "",
                  "status": "",
                  "value": "",
                  "verified": false,
                  "verified_at": "",
                  "via": ""
                }
              ]
            },
            "issued_at": ""
          }
  - name: 401 Response
    description: genericError
    request:
      url: "{{baseUrl}}/sessions/whoami"
      method: GET
      headers:
        - name: Cookie
          value: ""
          disabled: true
        - name: X-Session-Token
          value: "{{apiKey}}"
      params:
        - name: Authorization
          value: ""
          type: query
          description: "in: authorization"
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": 404,
              "debug": "The database adapter was unable to find the element",
              "details": {},
              "message": "",
              "reason": "",
              "request": "",
              "status": ""
            }
          }
  - name: 500 Response
    description: genericError
    request:
      url: "{{baseUrl}}/sessions/whoami"
      method: GET
      headers:
        - name: Cookie
          value: ""
          disabled: true
        - name: X-Session-Token
          value: "{{apiKey}}"
      params:
        - name: Authorization
          value: ""
          type: query
          description: "in: authorization"
          disabled: true
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": 404,
              "debug": "The database adapter was unable to find the element",
              "details": {},
              "message": "",
              "reason": "",
              "request": "",
              "status": ""
            }
          }

docs: |-
  Uses the HTTP Headers in the GET request to determine (e.g. by using checking the cookies) who is authenticated.
  Returns a session object in the body or 401 if the credentials are invalid or no credentials were sent.
  Additionally when the request it successful it adds the user ID to the 'X-Kratos-Authenticated-Identity-Id' header in the response.

  This endpoint is useful for reverse proxies and API Gateways.
