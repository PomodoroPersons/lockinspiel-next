info:
  name: Complete Login Flow with Username/Email Password Method
  type: http
  seq: 7
  tags:
    - public

http:
  method: POST
  url: "{{baseUrl}}/self-service/login?flow={{oryFlowID}}"
  params:
    - name: flow
      value: "{{oryFlowID}}"
      type: query
  body:
    type: json
    data: |-
      {
        "csrf_token": "{{oryCSRFToken}}",
        "identifier": "rooster0055@protonmail.com",
        "password": "orytestpassword",
        "method": "password"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

