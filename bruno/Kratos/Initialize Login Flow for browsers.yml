info:
  name: Initialize Login Flow for browsers
  type: http
  seq: 5
  tags:
    - public

http:
  method: GET
  url: "{{baseUrl}}/self-service/login/browser"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        function getUrlParameter(name) {
          name = name.replace(/[\[\]]/g, '\\$&');
          const regex = new RegExp(name + '=([^&#]*)');
          const results = regex.exec(res.getUrl().split('?')[1]);
          return results ? decodeURIComponent(results[1] || '') : null;
        }

        bru.setVar("oryFlowID", getUrlParameter("flow"));

        const htmlKVRegex = '(\\s+[-_A-Za-z0-9+\\/=]+)="?([-_A-Za-z0-9+\\/=]*)"?';
        const input = `<input(${htmlKVRegex})*\\/?>`;

        const inputRegex = new RegExp(input, "g");

        let csrfToken;
        let inputMatch;

        while ((inputMatch = inputRegex.exec(res.body)) !== null) {
          console.log(inputMatch)
          
          const htmlKV = new RegExp(htmlKVRegex, "g");
          
          let kvMatch;
          let csrfMatch;
          let nameMatch = false;
          
          while ((kvMatch = htmlKV.exec(inputMatch[0])) !== null) {
            console.log(kvMatch)
            if (kvMatch[1].trim() == "name" && kvMatch[2].trim() == "csrf_token")
              nameMatch = true;
            if (kvMatch[1].trim() == "value")
              csrfMatch = kvMatch[2].trim();
          }
          
          if(nameMatch) {
            bru.setVar("oryCSRFToken", csrfMatch);
            break;
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 302 Response
    description: |-
      Empty responses are sent when, for example, resources are deleted. The HTTP status code for empty responses is
      typically 201.
    request:
      url: "{{baseUrl}}/self-service/login/browser"
      method: GET
    response:
      status: 302
      statusText: Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: genericError
    request:
      url: "{{baseUrl}}/self-service/login/browser"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": 404,
              "debug": "The database adapter was unable to find the element",
              "details": {},
              "message": "",
              "reason": "",
              "request": "",
              "status": ""
            }
          }

docs: |-
  This endpoint initializes a browser-based user login flow. Once initialized, the browser will be redirected to
  `selfservice.flows.login.ui_url` with the flow ID set as the query parameter `?flow=`. If a valid user session
  exists already, the browser will be redirected to `urls.default_redirect_url` unless the query parameter
  `?refresh=true` was set.

  This endpoint is NOT INTENDED for API clients and only works with browsers (Chrome, Firefox, ...).

  More information can be found at [Ory Kratos User Login and User Registration Documentation](https://www.ory.sh/docs/next/kratos/self-service/flows/user-login-user-registration).
