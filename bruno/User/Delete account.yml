info:
  name: Delete account
  type: http
  seq: 2
  tags:
    - User

http:
  method: DELETE
  url: "{{baseUrl}}/auth/user"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        // Save token to environment variable
        bru.setVar("token", null);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/auth/user"
      method: DELETE
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
