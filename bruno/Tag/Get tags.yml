info:
  name: Get tags
  type: http
  seq: 1
  tags:
    - Tag

http:
  method: GET
  url: "{{baseUrl}}/timekeeper/tag"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/tag"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "name": ""
            }
          ]

docs: Gets all the tags associated with the user, as well as the default ones
