    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/tag/:id"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "name": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 401 Response
