info:
  name: Modify a tag
  type: http
  seq: 3
  tags:
    - Tag

http:
  method: PUT
  url: "{{baseUrl}}/timekeeper/tag/:id"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
