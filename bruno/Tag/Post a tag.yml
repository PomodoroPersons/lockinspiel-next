info:
  name: Post a tag
  type: http
  seq: 2
  tags:
    - Tag

http:
  method: POST
  url: "{{baseUrl}}/timekeeper/tag"
  body:
    type: json
    data: |-
      {
        "name": "tagged"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/tag"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "tag_id": ""
          }
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/tag"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""

docs: Adds a new tag to the database. The returned tag ID can be used in other endpoints in this service.
