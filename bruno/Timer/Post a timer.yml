info:
  name: Post a timer
  type: http
  seq: 2
  tags:
    - Timer

http:
  method: POST
  url: "{{baseUrl}}/timekeeper/timer"
  body:
    type: json
    data: |-
      {
        "time_split_timer": "",
        "start_time": "",
        "end_time": "",
        "tags": []
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Response for status 201
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: POST
      body:
        type: json
        data: |-
          {
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "time_split": "",
            "work": false,
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: POST
      body:
        type: json
        data: |-
          {
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Response for status 404
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: POST
      body:
        type: json
        data: |-
          {
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""

docs: Upon starting a new timer, the Unix timestamp of when the timer was started, as well as the Unix timestamp in the future when the timer will end should be sent to this service. The ID of the time split, whether the timer is a work or a break timer, and the tag IDs associated with the timer should also be sent.
