info:
  name: Retreive a timer
  type: http
  seq: 1
  tags:
    - Timer

http:
  method: GET
  url: "{{baseUrl}}/timekeeper/timer"
  params:
    - name: user_id
      value: ""
      type: query
      disabled: true
    - name: timer_start_time
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: GET
      params:
        - name: user_id
          value: ""
          type: query
          disabled: true
        - name: timer_start_time
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "time_split": "",
              "work": false,
              "time_split_timer": "",
              "start_time": "",
              "end_time": "",
              "tags": []
            }
          ]
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: GET
      params:
        - name: user_id
          value: ""
          type: query
          disabled: true
        - name: timer_start_time
          value: ""
          type: query
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Response for status 404
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: GET
      params:
        - name: user_id
          value: ""
          type: query
          disabled: true
        - name: timer_start_time
          value: ""
          type: query
          disabled: true
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""

docs: Retreives the most recently started/ended timer if no parameters are specified. Otherwise returns the timers that match the parameters.
