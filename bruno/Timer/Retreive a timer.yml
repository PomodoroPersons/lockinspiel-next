info:
  name: Retreive a timer
  type: http
  seq: 1
  tags:
    - Timer

http:
  method: GET
  url: "{{baseUrl}}/timekeeper/timer"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "time_split": "",
              "start_timestamp": "",
              "end_timestamp": "",
              "work": false,
              "tags": [],
              "name": ""
            }
          ]
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Response for status 404
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: GET
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""

docs: Retreives the most recently started/ended timer if no parameters are specified. Otherwise returns the timers that match the parameters.
