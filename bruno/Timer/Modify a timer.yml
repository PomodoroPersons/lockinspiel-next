info:
  name: Modify a timer
  type: http
  seq: 3
  tags:
    - Timer

http:
  method: PUT
  url: "{{baseUrl}}/timekeeper/timer/:id"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "time_split": "",
        "start_timestamp": "",
        "end_timestamp": "",
        "work": false,
        "tags": [],
        "name": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/timer/:id"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "time_split": "",
            "start_timestamp": "",
            "end_timestamp": "",
            "work": false,
            "tags": [],
            "name": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/timer/:id"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "time_split": "",
