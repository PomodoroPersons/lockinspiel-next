info:
  name: Modify a timer
  type: http
  seq: 3
  tags:
    - Timer

http:
  method: PUT
  url: "{{baseUrl}}/timekeeper/timer"
  body:
    type: json
    data: |-
      {
        "time_split_timer": "",
        "start_time": "",
        "end_time": "",
        "tags": []
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: PUT
      body:
        type: json
        data: |-
          {
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "time_split": "",
            "work": false,
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: PUT
      body:
        type: json
        data: |-
          {
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Response for status 404
    request:
      url: "{{baseUrl}}/timekeeper/timer"
      method: PUT
      body:
        type: json
        data: |-
          {
            "time_split_timer": "",
            "start_time": "",
            "end_time": "",
            "tags": []
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""

docs: This route replaces the fields of the timer at the passed in start time with new fields. When a timer is paused, this route should be used to change the end_timestamp of the timer to the Unix timestamp at which the timer was paused. To resume a timer, a new timer should be posted with the Unix timestamp at which the timer was resumed, and the Unix timestamp in the future at which the remaining time will have elapsed.
