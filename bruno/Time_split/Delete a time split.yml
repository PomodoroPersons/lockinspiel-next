info:
  name: Delete a time split
  type: http
  seq: 4
  tags:
    - Time_split

http:
  method: DELETE
  url: "{{baseUrl}}/timekeeper/time-split/:id"
  params:
    - name: id
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/time-split/:id"
      method: DELETE
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/time-split/:id"
      method: DELETE
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Response for status 404
    request:
      url: "{{baseUrl}}/timekeeper/time-split/:id"
      method: DELETE
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""

docs: Deletes the time split at the given ID. This just marks the time split as deleted, and doesn't actually delete the time split in the database. Timers posted with a deleted time split will still have that time split, the time split just won't appear when querying some endpoints.
