info:
  name: Post a time split timer
  type: http
  seq: 4
  tags:
    - Time_split

http:
  method: POST
  url: "{{baseUrl}}/timekeeper/time-split/:id"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "order_idx": "",
        "len": "",
        "name": "",
        "work": false
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

