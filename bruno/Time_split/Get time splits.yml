info:
  name: Get time splits
  type: http
  seq: 2
  tags:
    - Time_split

http:
  method: GET
  url: "{{baseUrl}}/timekeeper/time-split"
  params:
    - name: id
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/time-split"
      method: GET
      params:
        - name: id
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "timers": [
                {
                  "id": "",
                  "order_idx": "",
                  "len": "",
                  "name": "",
                  "work": false
                }
              ],
              "name": "",
              "description": "",
              "id": ""
            }
          ]

docs: Gets all the time splits associated with the user, as well as the default ones
