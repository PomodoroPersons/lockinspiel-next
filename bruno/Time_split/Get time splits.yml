info:
  name: Get time splits
  type: http
  seq: 2
  tags:
    - Time_split

http:
  method: GET
  url: "{{baseUrl}}/timekeeper/time-split"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Response for status 200
    request:
      url: "{{baseUrl}}/timekeeper/time-split"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "name": "",
              "description": "",
              "deleted": false,
              "timers": [
                {
                  "len": "",
                  "name": "",
                  "work": false
                }
              ]
            }
          ]
  - name: 401 Response
    description: Response for status 401
    request:
      url: "{{baseUrl}}/timekeeper/time-split"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""

docs: Gets all the time splits associated with the user, as well as the default ones
