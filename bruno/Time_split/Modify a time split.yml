info:
  name: Modify a time split
  type: http
  seq: 3
  tags:
    - Time_split

http:
  method: PUT
  url: "{{baseUrl}}/timekeeper/time-split/:id"
  params:
    - name: id
      value: "5"
      type: path
  body:
    type: json
    data: |-
      {
        "name": "better name",
        "description": "better description",
        "deleted": false,
        "timers": [
          {
            "len": 300,
            "name": "so break we broken",
            "work": false
          }
        ]
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

