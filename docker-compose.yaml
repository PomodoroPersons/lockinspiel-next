services:

  db:
    volumes:
      # PGDATA directory is persisted between restarts
      - pgdata:/var/lib/postgresql
    image: postgres
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    build:
      context: docker/postgres
    healthcheck:
      test:
        [
        "CMD",
        "pg_isready",
        "-U",
        "postgres",
        "-h",
        "localhost"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
     

  kong:
    image: kong:3
    restart: unless-stopped
    ports:
      - 8000:8000/tcp
      - 8443:8443/tcp
    volumes:
      - ./volumes/api:/kong/declarative/
      - type: tmpfs
        target: /tmp
      - type: tmpfs
        target: /var/run/kong
      # - ./api/kong.yml:/kong/declarative/kong.yml
    depends_on:
      web-auth:
        # condition: service_healthy
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      KONG_PREFIX: /var/run/kong
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,ip-restriction,opentelemetry,prometheus
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: 1.0
      KONG_STATUS_LISTEN: 0.0.0.0:8100
    # https://unix.stackexchange.com/a/294837
    # entrypoint: bash -c 'eval "echo \"$$(cat /kong/declarative/temp.yml)\"" > /kong/declarative/kong.yml && /docker-entrypoint.sh kong docker-start'
  
  # RustFS main service
  # https://github.com/rustfs/rustfs/blob/main/docker-compose.yml
  rustfs:
    security_opt:
      - "no-new-privileges:true"
    image: rustfs/rustfs:latest
    ports:
      # - "9000:9000" # S3 API port
      - "9001:9001" # Console port
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0..3} # Define 4 storage volumes
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_OBS_LOG_DIRECTORY=/app/logs
      - RUSTFS_TLS_PATH=/opt/tls
      - RUSTFS_OBS_ENDPOINT=http://otel-collector:4318
    volumes:
      - ./volumes/rustfs/data/pro:/data
      - ./volumes/rustfs/logs:/app/logs
      - ./volumes/rustfs/data/certs/:/opt/tls # TLS configuration, you should create tls directory and put your tls files in it and then specify the path here
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      otel-collector:
        condition: service_started

  rc:
    image: rustfs/rc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/rc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin) do echo '...waiting...' && sleep 1; done;
      /usr/bin/rc mb rustfs/tempo;
      /usr/bin/rc mb rustfs/loki-data;
      /usr/bin/rc mb rustfs/loki-ruler;
      /usr/bin/rc anonymous set public rustfs/tempo;
      /usr/bin/rc anonymous set public rustfs/loki-data;
      /usr/bin/rc anonymous set public rustfs/loki-ruler;
      tail -f /dev/null
      "

  redpanda-0:
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      # Address the broker advertises to clients that connect to the Kafka API.
      # Use the internal addresses to connect to the Redpanda brokers'
      # from inside the same Docker network.
      # Use the external addresses to connect to the Redpanda brokers'
      # from outside the Docker network.
      - --advertise-kafka-addr internal://redpanda-0:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      # Address the broker advertises to clients that connect to the HTTP Proxy.
      - --advertise-pandaproxy-addr internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      # Redpanda brokers use the RPC API to communicate with each other internally.
      - --rpc-addr redpanda-0:33145
      - --advertise-rpc-addr redpanda-0:33145
      # Mode dev-container uses well-known configuration properties for development in containers.
      - --mode dev-container
      # Tells Seastar (the framework Redpanda uses under the hood) to use 1 core on the system.
      - --smp 1
      - --default-log-level=info
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.6
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 15s
      retries: 10
    depends_on:
      - otel-collector
    # ports:
    #   - 18081:18081
    #   - 18082:18082
    #   - 19092:19092
    #   - 19644:9644


  redpanda-create-topics:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.6
    depends_on:
      redpanda-0:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      rpk topic create tempo-ingest --brokers redpanda-0:9092 --if-not-exists --partitions 1 --replicas 1;
      tail -f /dev/null
      "

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    environment:
      POSTGRESQL_PASSWORD: example
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./volumes/otel-collector/otel-collector-config.yaml:/otel-local-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["--config=/otel-local-config.yaml"]
    # healthcheck:
    #   test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    # ports:
    #   - "4318:4318"  # OTLP receiver

  tempo:
    image: grafana/tempo:latest
    depends_on:
      - redpanda-create-topics
    command: "-target=all -config.file=/etc/tempo.yaml"
    restart: always
    volumes:
      - ./volumes/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # tempo
      # - "4317:4317" # Tempo OTLP GRPC
      # - "4318:4318" # Tempo OTLP HTTP
    environment:
     - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318

  vulture:
    image: grafana/tempo-vulture:latest
    restart: always
    command:
      [
        "-prometheus-listen-address=:8080",
        "-tempo-query-url=http://tempo:3200",
        "-tempo-push-url=http://tempo:4317",
      ]
    depends_on:
      - tempo

  loki:
    image: grafana/loki:latest
    command: "-config.file=/etc/loki/config.yaml -target=all"
    ports:
      - 3101:3100
      - 7946
      - 9095
    volumes:
      - ./volumes/loki/config.yaml:/etc/loki/config.yaml
    depends_on:
      - rustfs
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    ports:
      - 9090:9090
    restart: unless-stopped
    volumes:
      - ./volumes/prometheus:/etc/prometheus
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - ./volumes/grafana:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana

  web-auth:
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redpanda-create-topics:
        condition: service_started
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 10
    build:
      args:
        SERVICE: auth
      context: .
      dockerfile: docker/Dockerfile
    environment:
      AUTH_SERVICE: http://web-auth
      DATABASE_URL: postgres://docker:example@db/docker
      SERVICE_TYPE: auth
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4320
      KAFKA_OTLP_ENDPOINT: http://otel-collector:4317
      KAFKA_BROKERS: redpanda-0:9092
      KAFKA_USER_TOPIC: user-queue
      KAFKA_OFFER_TOPIC: offer-queue
      # RUST_LOG: debug
    deploy:
      mode: replicated
      replicas: 3

volumes:
  pgdata:
  redpanda_data:
  prom_data:
  tempo_data:
  grafana_data:

